<!-- Conversor de Moedas -->
<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Conversor de Moedas</title>
</head>

<body class="all">
    <img class="logo" src="./assets/logo.gif" alt="Logo do Conversor de Moedas" />

    <main class="container">
        <label class="select">
            Conversor <b>de</b>
            <select class="Selectoption">
                <option class="option" value="Real">R$ Real Brasileiro</option>
            </select>
        </label>

        <label class="select">
            Conversor <b>de</b>
            <select class="Selectoption">
                <option class="option" value="dolar">US$ Dólar Americano</option>
                <option class="option" value="euro">€ Euro Europeu</option>
                <option class="option" value="libra">£ Libra Esterlina</option>
            </select>
        </label>

        <label class="valor">
            Valor:
            <input id="inseriValor" class="inseriValor" type="number" placeholder=" R$ 10.000.00" />
        </label>

        <button id="converterButton" class="converterButton">Converter</button>

        <section class="resultado">
            <div class="divResultado">
                <img src="./assets/fcf15cc7ea5a0aa77537e7939a6742b588d600a6.png" alt="Real Brasileiro"
                    class="imgpaiz" />
                <p class="moeda">Real</p>
                <p id="resultadovalor" class="resultadovalor">R$ 0,00</p>
            </div>

            <img class="indicador" src="./assets/Vector.png" />

            <div class="divResultado">
                <img src="./assets/0bd85ff79a7dabec33201d95eb1a05fdea133971.png" alt="Dólar Americano"
                    class="imgpaiz" />
                <p class="moeda">Dólar</p>
                <p id="resultadofinal" class="resultadovalor">US$ 0,00</p>
            </div>
            <!-- <div>
                <img src="./assets/0bd85ff79a7dabec33201d95eb1a05fdea133971.png" alt="Libra Esterlina" class="imgpaiz">
                <p>Libra Esterlina</p>
                <p> £ 0,00</p>
            </div>
            <div>
                <img src="./assets/0bd85ff79a7dabec33201d95eb1a05fdea133971.png" alt="Euro Europeu" class="imgpaiz">
                <p>Euro Europeu</p>
                <p> € 0,00</p>
            </div> -->
        </section>
    </main>
</body>

<script src="script.js"></script>

</html>
