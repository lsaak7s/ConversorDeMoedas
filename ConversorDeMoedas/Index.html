<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Conversor de Moedas</title>
</head>

<body>
    <img src="./assets/logo.gif" alt="Logo do Conversor de Moedas" class="logo">
    <main>
        <label>
            Conversor <b>de</b>
            <select>
                <option value="Real">R$ Real Brasileiro</option>
            </select>
        </label>
        <label>
            Conversor <b>de</b>
            <select>
                <option value="dolar"> US$ Dólar Americano</option>
                <option value="euro"> € Euro Europeu</option>
                <option value="libra"> £ Libra Esterlina</option>
            </select>
        </label>
        <label>
            Valor:
            <input type="number" id="valor" placeholder=" R$ 10.000.00">
        </label>
        <button id="converter">Converter</button>
        <section>
            <div>
                <img src="./assets/fcf15cc7ea5a0aa77537e7939a6742b588d600a6.png" alt="Real Brasileiro" class="imgpaiz">
                <p>Real Brasileiro</p>
                <p>R$ 0,00</p>
            </div>
            <img src="./assets/Vector.png">
            <div>
                <img src="./assets/0bd85ff79a7dabec33201d95eb1a05fdea133971.png" alt="Dólar Americano" class="imgpaiz">
                <p>Dólar Americano</p>
                <p> US$ 0,00</p>
            </div>
            <div>
                <img src="./assets/0bd85ff79a7dabec33201d95eb1a05fdea133971.png" alt="Libra Esterlina" class="imgpaiz">
                <p>Libra Esterlina</p>
                <p> £ 0,00</p>
            </div>
            <div>
                <img src="./assets/0bd85ff79a7dabec33201d95eb1a05fdea133971.png" alt="Euro Europeu" class="imgpaiz">
                <p>Euro Europeu</p>
                <p> € 0,00</p>
            </div>
        </section>
    </main>
</body>

<script src="script.js"></script>

</html>
